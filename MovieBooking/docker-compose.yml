name: movie-booking-new  # Đặt tên project mới ở đây

services:
  db-new:
    image: postgres:17
    container_name: movie-db-v2
    restart: always
    ports:
      - "5434:5432" # Đổi port sang 5434 để tránh trùng nếu cái cũ đang chạy
    env_file:
      - ./backend/.env
    volumes:
      - db_data_new:/var/lib/postgresql/data # Volume hoàn toàn mới
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-new:
    image: redis:7-alpine
    container_name: movie-redis-v2
    restart: always
    ports:
      - "6380:6379" # Đổi port
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  app-new:
    build:
      context: ./backend
      dockerfile: Dockerfile
      no_cache: true # Ép build lại từ đầu
    container_name: movie-app-v2
    ports:
      - "8081:8080" # Chạy ở port 8081
      - "5006:5005" # Debug port mới
    env_file:
      - ./backend/.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-new:5432/postgres # Chỉ định đúng tên service db mới
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update # Giữ dữ liệu cũ, chỉ cập nhật schema khi cần
      - IMDB_SEED_ENABLED=true # Tự động sync IMDb movies + seed ratings cho admin lúc startup
      - IMDB_SEED_ADMIN_EMAIL=admin@gmail.com
      # Có thể tùy chỉnh danh sách IMDb IDs nếu cần
      # - IMDB_SEED_IDS=tt12042730,tt15398776,tt9362722
    depends_on:
      db-new:
        condition: service_healthy
      redis-new:
        condition: service_healthy

volumes:
  db_data_new: # Khai báo volume mới